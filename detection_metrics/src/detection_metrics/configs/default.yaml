# configs/default.yaml - All defaults in one file
# User only needs to override what differs from these defaults

evaluate:
  dataset:
    gt_path: null         # Required: path to ground truth (COCO JSON or YOLO dir)
    predictions: []       # Required: list of {path, name}
  iou_threshold: 0.5
  conf_threshold: 0.001
  class_ids: null         # null = all classes, or list of ints e.g. [1, 2]
  class_names: null       # Optional: list of class names

analyze:
  precision_targets: [0.8, 0.85, 0.9]
  conf_thresholds: [0.3, 0.4, 0.5, 0.6]
  vis_conf_threshold: 0.5

output:
  path: ./results
  overwrite: false
  use_cache: true
  log_file: null          # Optional: path to log file
