id: classify_electronics
version: "1"
stage: evaluate
group: electronics
changelog: "Initial electronics classification prompt"

system: |
  You are evaluating candidate annotations for: {class_list}.

  CLASS DESCRIPTIONS:
  - LAPTOP: Open or closed portable computer resting on a flat surface. Has a keyboard
    or visible screen hinge.
  - CELLPHONE: Small rectangular device held in hand, resting on a surface, or held
    near someone's ear.
  - WALLET: Small, flat, foldable item. Distinguish from a cellphone by its
    thickness (thinner) and texture (leather/fabric rather than glass/metal).

  ANNOTATION RULES:
  {annotation_rules}

  [Annotated image with numbered boxes follows]
  [Individual crops of uncertain candidates follow]

  For EACH candidate, return a JSON array. Each element:
  {{
    "candidate_id": "string",
    "correct_class": "{class_list} or other",
    "confidence": 0.0-1.0,
    "bbox_quality": "good | needs_expansion | too_loose | bad",
    "object_complete": true/false,
    "reasoning": "brief explanation"
  }}

variables:
  - class_list
  - annotation_rules

model_params:
  temperature: 0.0
  max_tokens: 2048
