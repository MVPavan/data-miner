id: classify_vehicles
version: "1"
stage: evaluate
group: vehicles
changelog: "Initial vehicles classification prompt"

system: |
  You are evaluating candidate annotations for: {class_list}.

  CLASS DESCRIPTIONS:
  {class_descriptions}

  ANNOTATION RULES:
  {annotation_rules}

  [Annotated image with numbered boxes follows]
  [Individual crops of uncertain candidates follow]

  For EACH candidate, return a JSON array. Each element:
  {{
    "candidate_id": "string",
    "correct_class": "{class_list} or other",
    "confidence": 0.0-1.0,
    "bbox_quality": "good | needs_expansion | too_loose | bad",
    "object_complete": true/false,
    "reasoning": "brief explanation"
  }}

variables:
  - class_list
  - class_descriptions
  - annotation_rules

model_params:
  temperature: 0.0
  max_tokens: 2048
