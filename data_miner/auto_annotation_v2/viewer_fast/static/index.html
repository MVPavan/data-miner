<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AA v2 Viewer</title>
<style>
  :root {
    --bg: #111; --bg2: #1a1a2e; --bg3: #222; --text: #e0e0e0;
    --accent: #3b82f6; --border: #333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 280px; min-width: 280px; background: var(--bg2); display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  #sidebar-header { padding: 12px; border-bottom: 1px solid var(--border); }
  #sidebar-header h2 { font-size: 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  #refresh-btn { background: none; border: 1px solid var(--border); color: var(--text); cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 13px; }
  #refresh-btn:hover { background: var(--bg3); }
  #search { width: 100%; padding: 6px 10px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #count { font-size: 12px; color: #888; margin-top: 6px; }
  #image-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .stem-btn { display: block; width: 100%; text-align: left; padding: 6px 10px; margin-bottom: 2px; background: none; border: none; color: var(--text); cursor: pointer; border-radius: 4px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stem-btn:hover { background: var(--bg3); }
  .stem-btn.active { background: #1e3a5f; color: #93c5fd; }

  /* Main area */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Tabs */
  #tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 12px; flex-shrink: 0; }
  .tab { padding: 10px 14px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; color: #888; user-select: none; white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Legend */
  #legend { display: flex; align-items: center; gap: 16px; padding: 8px 16px; font-size: 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  /* Content */
  #content { flex: 1; display: flex; overflow: hidden; padding: 12px; gap: 12px; }

  /* Image panel */
  #image-panel { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  #image-container { position: relative; display: inline-block; max-width: 100%; max-height: 100%; }
  #image-container img { display: block; max-width: 100%; max-height: calc(100vh - 140px); object-fit: contain; }
  #image-container svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

  /* Detail panel */
  #detail-panel { width: 380px; min-width: 340px; overflow-y: auto; background: var(--bg2); border-radius: 8px; padding: 16px; }
  #detail-panel h3 { font-size: 15px; margin-bottom: 12px; }
  .detail-card { background: var(--bg3); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; }
  .detail-card .field { margin-bottom: 2px; }
  .detail-card .label { color: #888; }
  .detail-card .value { color: var(--text); font-weight: 500; }
  .detail-card .reasoning { color: #aaa; font-style: italic; margin-top: 4px; }
  .detail-header { font-size: 13px; color: #aaa; margin-bottom: 10px; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; right: 20px; background: #1e3a5f; color: #93c5fd; padding: 10px 18px; border-radius: 6px; font-size: 13px; display: none; z-index: 999; }

  /* Loading */
  .loading { color: #666; font-size: 14px; text-align: center; padding: 40px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>Images <button id="refresh-btn" title="Re-scan output directory">↻</button></h2>
    <input id="search" type="text" placeholder="Search images...">
    <div id="count"></div>
  </div>
  <div id="image-list"></div>
</div>

<div id="main">
  <div id="tabs">
    <div class="tab active" data-stage="proposal">1. Proposal</div>
    <div class="tab" data-stage="filtering">2. Filtering</div>
    <div class="tab" data-stage="screening">3a. Screening</div>
    <div class="tab" data-stage="detailed">3b. Detailed</div>
    <div class="tab" data-stage="refinement">4. Refinement</div>
    <div class="tab" data-stage="validation">5. Validation</div>
    <div class="tab" data-stage="final">6. Final</div>
  </div>

  <div id="legend">
    <span style="font-weight:600">Sources:</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#0096FF"></span>falcon</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#FF6400"></span>grounding_dino</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#00C864"></span>sam</span>
    <span style="color:#555">|</span>
    <span style="font-weight:600">Decisions:</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#00C800"></span>accept</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#FFA500"></span>needs_review</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#FF0000"></span>reject</span>
  </div>

  <div id="content">
    <div id="image-panel">
      <div id="image-container">
        <img id="viewer-img" src="" alt="">
        <svg id="overlay-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1" preserveAspectRatio="none"></svg>
      </div>
    </div>
    <div id="detail-panel">
      <h3>Details</h3>
      <div id="detail-content" class="loading">Select an image</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const S = {
  stems: [],
  currentStem: null,
  currentStage: 'proposal',
  data: null,        // loaded checkpoint JSON for current stem
  cidIndex: {},      // candidate_id -> proposal-order index
  imgW: 0, imgH: 0, // natural image dimensions
};

// ---------------------------------------------------------------------------
// Color maps
// ---------------------------------------------------------------------------
const SOURCE_COLORS = { falcon: '#0096FF', grounding_dino: '#FF6400', sam: '#00C864' };
const DECISION_COLORS = { accept: '#00C800', needs_review: '#FFA500', reject: '#FF0000' };
const ACTION_COLORS = { accept: '#00C800', human_review: '#FFA500', reject: '#FF0000' };
const FALLBACK = ['#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF','#00FFFF','#800000','#008000','#000080','#808000','#800080','#008080'];

// ---------------------------------------------------------------------------
// DOM refs
// ---------------------------------------------------------------------------
const $list = document.getElementById('image-list');
const $search = document.getElementById('search');
const $count = document.getElementById('count');
const $img = document.getElementById('viewer-img');
const $svg = document.getElementById('overlay-svg');
const $detail = document.getElementById('detail-content');
const $toast = document.getElementById('toast');
const $tabs = document.querySelectorAll('.tab');

// ---------------------------------------------------------------------------
// API helpers
// ---------------------------------------------------------------------------
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

// ---------------------------------------------------------------------------
// Sidebar
// ---------------------------------------------------------------------------
function renderSidebar() {
  const q = $search.value.toLowerCase();
  let visible = 0;
  $list.innerHTML = '';
  for (const stem of S.stems) {
    if (q && !stem.toLowerCase().includes(q)) continue;
    visible++;
    const btn = document.createElement('button');
    btn.className = 'stem-btn' + (stem === S.currentStem ? ' active' : '');
    btn.textContent = stem.length > 36 ? stem.slice(0, 36) + '…' : stem;
    btn.title = stem;
    btn.onclick = () => selectImage(stem);
    $list.appendChild(btn);
  }
  $count.textContent = q ? `${visible}/${S.stems.length} images` : `${S.stems.length} images`;
}

async function refreshStems() {
  const oldCount = S.stems.length;
  S.stems = await fetchJSON('/api/stems');
  renderSidebar();
  const added = S.stems.length - oldCount;
  if (added > 0) showToast(`${added} new image(s) found`);
  else showToast('No new images');
}

$search.addEventListener('input', renderSidebar);
document.getElementById('refresh-btn').onclick = refreshStems;

// ---------------------------------------------------------------------------
// Image selection
// ---------------------------------------------------------------------------
async function selectImage(stem) {
  S.currentStem = stem;
  renderSidebar();  // highlight active
  $detail.innerHTML = '<div class="loading">Loading…</div>';
  $svg.innerHTML = '';

  S.data = await fetchJSON(`/api/data/${encodeURIComponent(stem)}`);
  S.imgW = S.data.image_width || 0;
  S.imgH = S.data.image_height || 0;

  // Build stable candidate_id -> index map from proposal order
  S.cidIndex = {};
  const proposals = S.data.proposal || [];
  proposals.forEach((c, i) => { if (c.candidate_id) S.cidIndex[c.candidate_id] = i; });

  // Load image
  if (S.data.image_url) {
    $img.src = S.data.image_url;
    $img.style.display = 'block';
  } else {
    $img.style.display = 'none';
  }

  renderStage();
}

// ---------------------------------------------------------------------------
// Stage tabs
// ---------------------------------------------------------------------------
$tabs.forEach(tab => {
  tab.onclick = () => {
    $tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    S.currentStage = tab.dataset.stage;
    renderStage();
  };
});

// ---------------------------------------------------------------------------
// SVG rendering (all client-side)
// ---------------------------------------------------------------------------
function svgRect(x1, y1, x2, y2, color, label, idx) {
  const w = x2 - x1, h = y2 - y1;
  const ly = Math.max(12, y1 - 4);
  return `<rect x="${x1}" y="${y1}" width="${w}" height="${h}" fill="none" stroke="${color}" stroke-width="3" data-idx="${idx}"/>` +
    `<text x="${x1}" y="${ly}" fill="${color}" font-size="13" font-weight="bold" style="text-shadow:1px 1px 2px #000,-1px -1px 2px #000">${esc(label)}</text>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function cidIdx(cid, fallback) { return S.cidIndex[cid] !== undefined ? S.cidIndex[cid] : fallback; }

function buildProposalSVG(candidates) {
  return candidates.map((c, i) => {
    const [x1,y1,x2,y2] = bboxPx(c.bbox);
    const src = c.source_model || 'unknown';
    const color = SOURCE_COLORS[src] || FALLBACK[i % FALLBACK.length];
    const idx = cidIdx(c.candidate_id, i);
    return svgRect(x1, y1, x2, y2, color, `#${idx} ${src} ${(c.score||0).toFixed(2)}`, idx);
  }).join('');
}

function buildFilteringSVG(candidates) {
  return candidates.map((c, i) => {
    const [x1,y1,x2,y2] = bboxPx(c.bbox);
    const src = c.source_model || 'unknown';
    const color = SOURCE_COLORS[src] || FALLBACK[i % FALLBACK.length];
    const idx = cidIdx(c.candidate_id, i);
    return svgRect(x1, y1, x2, y2, color, `#${idx} ${src}`, idx);
  }).join('');
}

function buildScreeningSVG(candidates, verdicts) {
  const candMap = Object.fromEntries(candidates.map(c => [c.candidate_id, c]));
  return verdicts.map((v, i) => {
    const c = candMap[v.candidate_id];
    if (!c) return '';
    const [x1,y1,x2,y2] = bboxPx(c.bbox);
    const d = v.decision || 'reject';
    const color = DECISION_COLORS[d] || '#888';
    const idx = cidIdx(v.candidate_id, i);
    return svgRect(x1, y1, x2, y2, color, `#${idx} ${d.toUpperCase()} ${(v.confidence||0).toFixed(2)}`, idx);
  }).join('');
}

function buildFinalSVG(annotations) {
  return annotations.map((a, i) => {
    const [x1,y1,x2,y2] = bboxPx(a.bbox);
    const act = a.action || 'reject';
    const color = ACTION_COLORS[act] || '#888';
    const idx = cidIdx(a.candidate_id, i);
    return svgRect(x1, y1, x2, y2, color, `#${idx} ${act.toUpperCase()} ${(a.confidence||0).toFixed(2)}`, idx);
  }).join('');
}

function bboxPx(bbox) {
  return [bbox.x1 * S.imgW, bbox.y1 * S.imgH, bbox.x2 * S.imgW, bbox.y2 * S.imgH];
}

// ---------------------------------------------------------------------------
// Detail panel
// ---------------------------------------------------------------------------
function candidateCard(c) {
  const idx = cidIdx(c.candidate_id, '?');
  const b = c.bbox || {};
  return `<div class="detail-card">
    <div class="field"><span class="label">#${idx}</span> <span class="value">${esc(c.candidate_id||'?')}</span></div>
    <div class="field"><span class="label">Class:</span> <span class="value">${esc(c.class_name||'?')}</span> | <span class="label">Label:</span> <span class="value">${esc(c.label||'?')}</span></div>
    <div class="field"><span class="label">Model:</span> <span class="value">${esc(c.source_model||'?')}</span> | <span class="label">Score:</span> <span class="value">${(c.score||0).toFixed(4)}</span></div>
    <div class="field"><span class="label">BBox:</span> <span class="value">(${(b.x1||0).toFixed(4)}, ${(b.y1||0).toFixed(4)}, ${(b.x2||0).toFixed(4)}, ${(b.y2||0).toFixed(4)})</span></div>
    <div class="field"><span class="label">Expression:</span> <span class="value">${esc(c.expression||'?')}</span></div>
  </div>`;
}

function verdictCard(v) {
  const idx = cidIdx(v.candidate_id, '?');
  return `<div class="detail-card">
    <div class="field"><span class="label">#${idx}</span> <span class="value">${esc(v.candidate_id||'?')}</span></div>
    <div class="field"><span class="label">Decision:</span> <span class="value">${esc(v.decision||'?')}</span></div>
    <div class="field"><span class="label">Confidence:</span> <span class="value">${(v.confidence||0).toFixed(4)}</span></div>
    <div class="reasoning">${esc(v.reasoning||'N/A')}</div>
  </div>`;
}

function annotationCard(a) {
  const idx = cidIdx(a.candidate_id, '?');
  const trace = (a.reasoning_trace || []).map(t => `<li>${esc(t)}</li>`).join('');
  return `<div class="detail-card">
    <div class="field"><span class="label">#${idx}</span> <span class="value">${esc(a.candidate_id||'?')}</span></div>
    <div class="field"><span class="label">Action:</span> <span class="value">${esc(a.action||'?')}</span></div>
    <div class="field"><span class="label">Confidence:</span> <span class="value">${(a.confidence||0).toFixed(4)}</span></div>
    <div class="field"><span class="label">Source:</span> <span class="value">${esc(a.source_model||'?')}</span> | <span class="label">Refined:</span> <span class="value">${a.was_refined||false}</span></div>
    ${trace ? `<ul style="margin-top:4px;padding-left:16px;color:#aaa;font-size:12px">${trace}</ul>` : ''}
  </div>`;
}

// ---------------------------------------------------------------------------
// Stage render dispatcher
// ---------------------------------------------------------------------------
function renderStage() {
  if (!S.data) return;
  const d = S.data;
  let svg = '', detail = '';

  $svg.setAttribute('viewBox', `0 0 ${S.imgW} ${S.imgH}`);

  const stage = S.currentStage;

  if (stage === 'proposal') {
    const c = d.proposal || [];
    svg = buildProposalSVG(c);
    detail = `<div class="detail-header"><b>${c.length} candidates</b> from detection models</div>` + c.map(candidateCard).join('');
  }
  else if (stage === 'filtering') {
    const c = d.filtering || [];
    const pCount = (d.proposal || []).length;
    svg = buildFilteringSVG(c);
    detail = `<div class="detail-header"><b>${pCount} → ${c.length}</b> after geometric + IoU filtering</div>` + c.map(candidateCard).join('');
  }
  else if (stage === 'screening') {
    const reasoning = d.vlm_reasoning || {};
    const filtered = d.filtering || [];
    const verdicts = reasoning.screening || [];
    svg = buildScreeningSVG(filtered, verdicts);
    const na = verdicts.filter(v => v.decision === 'accept').length;
    const nr = verdicts.filter(v => v.decision === 'reject').length;
    const nv = verdicts.filter(v => v.decision === 'needs_review').length;
    detail = `<div class="detail-header"><b>Screening:</b> ${na} accept, ${nv} review, ${nr} reject</div>` + verdicts.map(verdictCard).join('');
  }
  else if (stage === 'detailed') {
    const reasoning = d.vlm_reasoning || {};
    const filtered = d.filtering || [];
    const verdicts = reasoning.detailed || [];
    if (verdicts.length) {
      svg = buildScreeningSVG(filtered, verdicts);
      detail = `<div class="detail-header"><b>${verdicts.length} detailed verdicts</b></div>` + verdicts.map(verdictCard).join('');
    } else {
      detail = '<div class="detail-header">No candidates needed detailed review.</div>';
    }
  }
  else if (stage === 'refinement') {
    const ref = d.vlm_refinement || {};
    const candidates = ref.candidates || [];
    const actions = ref.actions || [];
    if (candidates.length) {
      svg = buildFilteringSVG(candidates);
      detail = `<div class="detail-header"><b>${candidates.length} candidates, ${actions.length} actions</b></div>` + candidates.map(candidateCard).join('');
    } else {
      detail = '<div class="detail-header">No candidates needed refinement.</div>';
    }
  }
  else if (stage === 'validation') {
    const val = d.vlm_validation || {};
    const ref = d.vlm_refinement || {};
    const filtered = d.filtering || [];
    const verdicts = val.screening || [];
    const cands = ref.candidates || filtered;
    if (verdicts.length) {
      svg = buildScreeningSVG(cands, verdicts);
      detail = `<div class="detail-header"><b>${verdicts.length} validation verdicts</b></div>` + verdicts.map(verdictCard).join('');
    } else {
      detail = '<div class="detail-header">No refined candidates to validate.</div>';
    }
  }
  else if (stage === 'final') {
    const trace = d.trace || {};
    const annotations = trace.final_annotations || [];
    const labels = d.labels || '';
    const nLabels = labels.trim() ? labels.trim().split('\n').length : 0;
    if (annotations.length) {
      svg = buildFinalSVG(annotations);
      detail = `<div class="detail-header"><b>${nLabels} YOLO labels saved</b></div>` + annotations.map(annotationCard).join('');
    } else {
      detail = '<div class="detail-header">No final annotations.</div>';
    }
  }

  $svg.innerHTML = svg;
  $detail.innerHTML = detail || '<div class="loading">No data for this stage.</div>';
}

// ---------------------------------------------------------------------------
// Toast
// ---------------------------------------------------------------------------
function showToast(msg) {
  $toast.textContent = msg;
  $toast.style.display = 'block';
  setTimeout(() => { $toast.style.display = 'none'; }, 2500);
}

// ---------------------------------------------------------------------------
// Keyboard navigation
// ---------------------------------------------------------------------------
document.addEventListener('keydown', (e) => {
  if (e.target === $search) return;
  const visibleBtns = [...$list.querySelectorAll('.stem-btn')];
  if (!visibleBtns.length) return;

  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const curIdx = visibleBtns.findIndex(b => b.classList.contains('active'));
    let next;
    if (e.key === 'ArrowDown') next = curIdx < visibleBtns.length - 1 ? curIdx + 1 : 0;
    else next = curIdx > 0 ? curIdx - 1 : visibleBtns.length - 1;
    visibleBtns[next].click();
    visibleBtns[next].scrollIntoView({ block: 'nearest' });
  }
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
(async () => {
  S.stems = await fetchJSON('/api/stems');
  renderSidebar();
  if (S.stems.length) await selectImage(S.stems[0]);
})();
</script>
</body>
</html>
