apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: download-worker
  namespace: data-miner
spec:
  serviceName: download-worker
  replicas: 9  # 3 nodes × 3 workers per node
  selector:
    matchLabels:
      app: download-worker
  template:
    metadata:
      labels:
        app: download-worker
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: download-worker
      containers:
        - name: download-worker
          image: data-miner:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "data_miner.workers.download"]
          env:
            - name: DATA_MINER_CONFIG
              value: "/config/config.yaml"
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@postgres.data-miner.svc.cluster.local:5432/data_miner"
            - name: LOKI_URL
              value: "http://loki.data-miner.svc.cluster.local:3100/loki/api/v1/push"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /config
            - name: seaweedfs
              mountPath: /swdfs_mnt/swshared
          livenessProbe:
            exec:
              command: ["test", "-f", "/tmp/healthy"]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: config
          configMap:
            name: data-miner-config
        - name: seaweedfs
          hostPath:
            path: /swdfs_mnt/swshared
            type: Directory
