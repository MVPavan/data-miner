# =============================================================================
# K3s Cluster Configuration — Single Source of Truth
# =============================================================================
# All infrastructure scripts (provision.py, orchestrate.py, generate_manifests.py)
# read from this file via cluster.py. Project-specific app config lives in
# run_configs/*.yaml files.
# =============================================================================

cluster:
  namespace: data-miner
  k3s_version: "v1.31.0+k3s1"
  ssh_key: "~/.ssh/id_rsa_dm_k3s"

  nodes:
    blrlambdav:
      ip: "10.96.122.8"
      role: master
      ssh_user: pavan
      no_storage: true
      image: gpu          # GPU node: runs all workers including ML
      labels:
        gpu: "true"
    
    arsenal:
      ip: "10.96.122.14"
      role: worker
      ssh_user: pavan
      image: base         # Only runs download workers

    moshe:
      ip: "10.164.45.5"
      role: worker
      ssh_user: pavan
      no_storage: true
      image: base         # Only runs download workers
    
    belfast:
      ip: "10.160.105.65"
      role: worker
      ssh_user: pavan
      no_storage: true
      image: base         # Only runs download workers

    manu:
      ip: "10.96.122.5"
      role: worker
      ssh_user: pavan
      storage_only: true  # No image needed (storage only)
    
    jay:
      ip: "10.96.122.131"
      role: worker
      ssh_user: pavan
      storage_only: true  # No image needed (storage only)
      data_dir: /data-sourabh/seaweed
    
    manthana:
      ip: "10.96.122.132"
      role: worker
      ssh_user: pavanmv
      storage_only: true  # No image needed (storage only)
    
    # -------------------------------------------------------------------------
    # Storage-only nodes (template - fill in when machines are available)
    # These nodes only run SeaweedFS volume servers, not data-miner workers
    # -------------------------------------------------------------------------
    # storage1:
    #   ip: "10.96.122.XXX"
    #   role: worker
    #   ssh_user: pavan
    #   storage_only: true
    #   data_dir: /mnt/large_disk/seaweed   # Custom path for this node
    #   disk_limit_mb: 500000   # 500GB
    #   labels:
    #     gpu: "true"

storage:
  seaweedfs_mount: /swdfs_mnt/swshared
  db_path: /data/data_miner_db
  db_services:
    postgres: 999
    loki: 10001
    grafana: 472

images:
  base:
    name: data-miner-base
    tag: latest
    dockerfile: Dockerfile.base
  gpu:
    name: data-miner-gpu
    tag: latest
    dockerfile: Dockerfile.gpu
  pull_policy: Never

seaweedfs:
  namespace: seaweedfs
  image: chrislusf/seaweedfs:latest
  data_dir: /data/seaweed
  schedule_on: master
  default_disk_limit_mb: 0    # 0 = unlimited (fallback if node has no disk_limit_mb)

nvidia:
  plugin_version: "v0.14.0"

database_url: "postgresql://postgres:postgres@postgres.${cluster.namespace}.svc.cluster.local:5432/data_miner"
loki_url: "http://loki.${cluster.namespace}.svc.cluster.local:3100/loki/api/v1/push"

# K8s overrides merged on top of default.yaml + run_config when generating ConfigMap
k3s_app_overrides:
  output_dir: "${storage.seaweedfs_mount}/data_miner_output"
  device: "auto"
  logging:
    log_dir: "${storage.seaweedfs_mount}/data_miner_output/logs"

resource_presets:
  small:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "1000m", memory: "2Gi" }
  medium:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2000m", memory: "4Gi" }
  gpu:
    requests: { cpu: "500m", memory: "4Gi" }
    limits:   { cpu: "2000m", memory: "16Gi" }

workers:
  download:
    kind: StatefulSet
    replicas: 12
    resources: ${resource_presets.medium}
    schedule_on: all
    extra_env:
      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
    liveness_probe:
      command: ["test", "-f", "/tmp/healthy"]
      initial_delay: 60
      period: 30
      failure_threshold: 3

  extract:
    replicas: 3
    resources: ${resource_presets.medium}
    schedule_on: master
    liveness_probe:
      command: ["test", "-f", "/tmp/healthy"]
      initial_delay: 60
      period: 30

  filter:
    replicas: 0
    resources: ${resource_presets.gpu}
    schedule_on: gpu
    hf_token: true

  dedup:
    replicas: 0
    resources: ${resource_presets.gpu}
    schedule_on: gpu
    hf_token: true

  detect:
    replicas: 0
    resources: ${resource_presets.gpu}
    schedule_on: gpu
    hf_token: true

  monitor:
    replicas: 1
    resources: ${resource_presets.medium}
    schedule_on: master
